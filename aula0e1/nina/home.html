<!DOCTYPE html>

<html lang="pt-br">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <style>
            header{
                display: flex;
                font-family:Helvetica;
                font-size: 25px;
            }
            
            body{
                display: flex;
                flex-direction: column;
                justify-content: center;
                background-color: rgb(235, 235, 235);
                margin-left: 5vw;
                margin-right: 5vw;
            }

            .pic{
                display: flex;
                flex-direction: row;
                margin-top: 5vh;
                gap: 15px;
                font-family: Helvetica;
                font-size: 20px;
            }

            #photo{
                width: 20vw;
                border-radius: 10px;
            }

            #info{
                display: flex;
                flex-direction: column;
                gap: 5px;
                font-size: 20px;
            }

            .cv:link, .cv:visited, .cv:active{
                color: black;
                text-decoration: none;
            }

            .cv{
                border: 1px solid black;
                border-radius: 5px;
                text-indent: 5px;
                width: 150px;
                background-color: rgb(250, 250, 230);
            }

            .cv:visited{
                background-color: rgb(218, 236, 243);
            }

            
            .cv:hover{
                background-color: rgb(240, 240, 195);
            }
            
            .cv:hover:visited{
                background-color: rgb(189, 225, 240);
            }

            #links{
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            </style>
    </head>
    <body>
        <div>

        </div>
        <header>
            Nina's Homepage
        </header>

        <div class="pic">
            <img id="photo" src='nina1.jpg' onmouseover="this.src='nina2.jpg';" onmouseout="this.src='nina1.jpg';" />
            <div id="info">
                <p> <b>Nina S. T. Hirata</b> <br>
                    Associate Professor
                </p>
                <div id="links">
                    <a class="cv" href="http://lattes.cnpq.br/0644408634493034">Lattes CV</a>
                    <a class="cv" href="https://scholar.google.com/citations?hl=en&user=HnC89_0AAAAJ">Google Scholar</a>
                </div>
                <p>
                    <a href="http://www.ime.usp.br/dcc/en/about">Department of Computer Science</a>   
                    <a href="http://www.ime.usp.br/">Institute of Mathematics, Statistics and Computer Science</a>
                    <a href=""
                </p>
            </div>
        </div>
    </body>
</html>
