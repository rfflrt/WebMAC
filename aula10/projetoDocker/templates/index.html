<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Minesweeper3000{% endblock %}</title>
        <link rel="stylesheet" href="/static/style.css">
        <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.js" integrity="sha384-ezjq8118wdwdRMj+nX4bevEi+cDLTbhLAeFF688VK8tPDGeLUe0WoY2MZtSla72F" crossorigin="anonymous"></script>
        {% block head %}{% endblock %}
    </head>
    <body>
        <nav>
        <a href="/">Minesweeper3000</a>
        {% if user %}
        <div class="nav-right">
            <a href="/leaderboard">Leaderboard</a>
            <span class="nav-user">{{ user.name }}</span>
            <a href="/logout">Logout</a>
        </div>
        {% endif %}
        </nav>

        <main id="main">
            {% block content %}{% endblock %}
        </main>
        <script src="/static/game.js"></script>
    </body>
</html>
